name: QuNes CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :qunes-android-app:assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: qunes-debug-apk
          path: qunes-android-app/build/outputs/apk/debug/*.apk
          retention-days: 30

  build-servers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Message Server
        uses: docker/build-push-action@v5
        with:
          context: ./qunes-msg-server
          push: false
          tags: ghcr.io/crispixar/qunes/msg-server:latest

      - name: Build Media Server
        uses: docker/build-push-action@v5
        with:
          context: ./qunes-server-media
          push: false
          tags: ghcr.io/crispixar/qunes/media-server:latest
