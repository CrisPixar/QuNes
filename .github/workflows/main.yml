name: QuNes CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x qunes-android-app/gradlew || true

      - name: Build Release APK
        run: |
          if [ -f "qunes-android-app/gradlew" ]; then
            cd qunes-android-app && ./gradlew assembleRelease
          else
            echo "Gradle wrapper not found, skipping android build"
          fi

  build-servers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Message Server
        uses: docker/build-push-action@v5
        with:
          context: ./qunes-msg-server
          push: false
          tags: ghcr.io/${{ github.repository }}/msg-server:latest

      - name: Build and Push Media Server
        uses: docker/build-push-action@v5
        with:
          context: ./qunes-server-media
          push: false
          tags: ghcr.io/${{ github.repository }}/media-server:latest